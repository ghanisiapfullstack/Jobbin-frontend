name: Trigger auto deployment for jobbin-frontend

on:
  push:
    branches:
      - main
    paths:
      - '**'
      - '.github/workflows/jobbin-frontend-AutoDeployTrigger-b9c77c4b-5918-455d-82af-86ee301582a0.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.JOBBINFRONTEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.JOBBINFRONTEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.JOBBINFRONTEND_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: ./Dockerfile
          registryUrl: jobbinregistry.azurecr.io
          registryUsername: ${{ secrets.JOBBINFRONTEND_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.JOBBINFRONTEND_REGISTRY_PASSWORD }}
          containerAppName: jobbin-frontend
          resourceGroup: jobbin-rg
          imageToBuild: jobbinregistry.azurecr.io/jobbin-frontend:${{ github.sha }}
